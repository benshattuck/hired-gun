# criteria.yaml — the terms you'll ride under.
#
# This drives the "is this job even worth riding for" half of the fit
# score (profile.yaml drives the "am I the right man for it" half). Be
# honest and specific, especially in dealbreakers — a vague price sets a
# vague deal.
#
# Copy this file to criteria.yaml and fill it in.

roles:
  titles: ["Senior Backend Engineer", "Staff Software Engineer", "Backend Tech Lead"]
  seniority: ["senior", "staff"]           # words that should appear in the posting's title/level
  industries_preferred: ["fintech", "developer tools"]
  industries_excluded: ["adtech", "gambling"]

compensation:
  currency: "USD"
  base_min: 170000
  total_comp_min: 220000                   # base + bonus + equity, annualized estimate
  negotiable: true

location:
  mode: ["remote", "hybrid"]               # any of: remote | hybrid | onsite
  hybrid_max_days_onsite: 2
  cities: ["Seattle, WA", "Portland, OR"]  # only matters if mode includes hybrid/onsite
  visa_sponsorship_needed: false
  relocation_ok: false

# The lines you won't cross. If the posting clearly states one of these,
# it should tank the score and get called out by name, not averaged away
# into a mediocre number.
dealbreakers:
  - "On-call heavier than 1 week per month"
  - "Return-to-office mandate beyond hybrid"
  - "Requires security clearance"

# Doesn't decide the deal, but should nudge the score and get a mention in
# the rationale when it's on the table.
nice_to_haves:
  - "Small team (<50 engineers)"
  - "Primarily Python or TypeScript"
  - "Established on-call rotation with a real error budget"

status: active   # active | paused — pause to stop scoring new postings while you sit one out
